<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJT08 - 은행 검색 페이지</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 검색 영역 -->
        <div class="search-box">
            <h2>은행 찾기</h2>
            
            <!-- 광역시/도 선택 -->
            <div class="form-group">
                <label for="region-select">광역시 / 도</label>
                <select id="region-select">
                    <option value="">광역시 / 도를 선택하세요</option>
                </select>
            </div>

            <!-- 시/군/구 선택 -->
            <div class="form-group">
                <label for="district-select">시 / 군 / 구</label>
                <select id="district-select" disabled>
                    <option value="">시 / 군 / 구를 선택하세요</option>
                </select>
            </div>

            <!-- 은행 선택 -->
            <div class="form-group">
                <label for="bank-select">은행</label>
                <select id="bank-select" disabled>
                    <option value="">은행을 선택하세요</option>
                </select>
            </div>

            <!-- 찾기 버튼 -->
            <button id="search-btn" class="search-button">찾기</button>

            <!-- 결과 메시지 -->
            <div id="result-message" class="result-message"></div>
        </div>

        <!-- 지도 영역 -->
        <div id="map" class="map-container"></div>
    </div>

    <!-- 프로젝트 JavaScript 파일들 -->
    <script type="module">
        // API 키를 먼저 로드하고 Kakao Map API 스크립트를 동적으로 추가
        import config from './js/apikey.js';
        
        // Kakao Map API 스크립트 동적 로드
        const script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${config.kakaoMapApiKey}&libraries=services&autoload=false`;
        script.onload = () => {
            kakao.maps.load(() => {
                // main.js 로드
                import('./js/main.js');
            });
        };
        document.head.appendChild(script);

    </script>
</body>
</html>
